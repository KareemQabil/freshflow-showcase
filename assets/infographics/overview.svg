<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="720" rx="32" fill="#081120"/>
  <rect x="24" y="24" width="1232" height="672" rx="28" fill="#0C1730"/>
  <text x="72" y="90" fill="#E8F0FF" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="700">FreshFlow Public Scope</text>
  <text x="72" y="128" fill="#7ED7FF" font-family="Segoe UI, Arial, sans-serif" font-size="20">The public case study centers on the operational layer where ERP systems succeed or fail.</text>

  <rect x="72" y="176" width="320" height="128" rx="18" fill="#13233B"/>
  <text x="104" y="226" fill="#E8F0FF" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Orders</text>
  <text x="104" y="264" fill="#AEBEDB" font-family="Segoe UI, Arial, sans-serif" font-size="20">state segmentation, filters, operational table control</text>

  <rect x="480" y="176" width="320" height="128" rx="18" fill="#13233B"/>
  <text x="512" y="226" fill="#E8F0FF" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Suppliers</text>
  <text x="512" y="264" fill="#AEBEDB" font-family="Segoe UI, Arial, sans-serif" font-size="20">vendor management and payable visibility</text>

  <rect x="888" y="176" width="320" height="128" rx="18" fill="#13233B"/>
  <text x="920" y="226" fill="#E8F0FF" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Purchase Orders</text>
  <text x="920" y="264" fill="#AEBEDB" font-family="Segoe UI, Arial, sans-serif" font-size="20">receiving, discrepancies, purchasing workflow</text>

  <rect x="72" y="360" width="520" height="264" rx="22" fill="#101D35"/>
  <text x="104" y="408" fill="#7ED7FF" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">What the public screenshots prove</text>
  <text x="104" y="452" fill="#E8F0FF" font-family="Segoe UI, Arial, sans-serif" font-size="24">• the ERP shell already expresses real module breadth</text>
  <text x="104" y="492" fill="#E8F0FF" font-family="Segoe UI, Arial, sans-serif" font-size="24">• orders, suppliers, and purchasing are connected workflows</text>
  <text x="104" y="532" fill="#E8F0FF" font-family="Segoe UI, Arial, sans-serif" font-size="24">• metrics, filters, and actions are operator-focused</text>
  <text x="104" y="572" fill="#E8F0FF" font-family="Segoe UI, Arial, sans-serif" font-size="24">• this is serious business software, not a static admin mockup</text>

  <rect x="632" y="360" width="576" height="264" rx="22" fill="#101D35"/>
  <text x="664" y="408" fill="#7ED7FF" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Broader private system direction</text>
  <text x="664" y="452" fill="#E8F0FF" font-family="Segoe UI, Arial, sans-serif" font-size="24">• inventory and stock movement</text>
  <text x="664" y="492" fill="#E8F0FF" font-family="Segoe UI, Arial, sans-serif" font-size="24">• drivers and settlement</text>
  <text x="664" y="532" fill="#E8F0FF" font-family="Segoe UI, Arial, sans-serif" font-size="24">• finance, reports, documents, RBAC, and settings</text>
  <text x="664" y="572" fill="#E8F0FF" font-family="Segoe UI, Arial, sans-serif" font-size="24">• stabilization and correctness work beyond the UI layer</text>
</svg>
